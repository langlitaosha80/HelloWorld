name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: 配置
        run: ./configure

      - name: 编译
        run: make

      - name: 单元测试
        run: make check

      - name: 完整性检查
        run: make distcheck

      # 可选：失败时上传日志，方便排查
      - name: 上传构建日志（仅失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            config.log
            config.status
            test-suite.log
